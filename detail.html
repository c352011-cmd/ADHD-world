<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&family=Roboto+Flex:opsz,wght@8..144,100..1000&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "kr";
        src: url("NanumBarunGothic.ttf") format("truetype");
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow-x: hidden;
        overflow-y: scroll;
        font-family: "Cossette Texte", "kr", sans-serif;
        background: linear-gradient(
          180deg,
          #f05 0.01%,
          #d400ff 20.67%,
          #0015ff 52.88%,
          #00ffd0 76.44%,
          #ffa600 96.15%
        );
        min-height: 200vh;
        color: #ffffff;
      }

      .info-section {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 60px 24px 40px;
        text-align: center;
      }

      #ballCanvas {
        display: block;
        margin-bottom: 20px;
      }

      .person-name {
        font-size: 1.1rem;
        font-weight: 700;
        margin-bottom: 4px;
        letter-spacing: 1px;
        margin-top: 25px;
      }

      .person-title {
        font-size: 0.9rem;
        opacity: 0.6;
        color: white;
        margin-top: 10px;
        margin-bottom: 10px;
        /* font-style: italic; */
      }

      .stats {
        width: 100%;
        max-width: 200px;
        display: flex;
        flex-direction: column;
        gap: 7px;
        margin-top: 15px;
      }

      .stat-bar-wrap {
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50px;
        height: 15px;
        overflow: hidden;
      }

      .stat-bar {
        height: 100%;
        border-radius: 50px;
        width: 0%;
      }

      .stat-bar.total-bar {
        background: linear-gradient(90deg, #00ff88, #ffcc00, #ff0055);
      }

      .stat-bar.dd-bar {
        background: linear-gradient(90deg, #55f793, #ffe643);
      }

      .stat-bar.compulsion-bar {
        background: linear-gradient(90deg, #3b82f6, #06b6d4);
      }

      .stat-label {
        font-size: 0.78rem;
        opacity: 0.55;
        letter-spacing: 1.5px;
        /* text-transform: uppercase; */
        margin-bottom: 0px;
        text-align: center;
      }

      .backBtn {
        position: fixed;
        top: 2rem;
        left: 2rem;
        z-index: 100;
        background: rgba(255, 255, 255, 0.5);
        border: none;

        font-family: "Cossette Texte", sans-serif;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s ease;

        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4); /* 얇은 흰 테두리 */
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.1),
          /* 아래 그림자 */ inset 0 0.5px 0 rgba(255, 255, 255, 0.6); /* 상단 하이라이트 */
        transition: 0.2s ease;

        padding: 7px 24px;
        border-radius: 16px;

        white-space: nowrap;
        width: auto; /* ← 자동 너비 */
        min-width: unset; /* ← 최소 너비 제거 */
        max-width: unset; /* ← 최대 너비 제거 */
        box-sizing: border-box;
      }
      .backBtn:hover {
        background: rgba(255, 255, 255, 0.8);
        transform: scale(1.04);

        box-shadow:
          0 6px 30px rgba(0, 0, 0, 0.15),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .others-section {
        padding: 0 0 80px;
      }

      .others-label {
        text-align: center;
        font-size: 1rem;
        letter-spacing: 1px;
        opacity: 0.7;
        padding: 20px 0 0;
        margin-top: 100px;
        color: white;
      }

      #othersCanvas {
        display: block;
        width: 100%;
      }

      #loading {
        text-align: center;
        padding: 80px 0;
        font-size: 1.2rem;
        opacity: 0.7;
      }
      #error {
        text-align: center;
        padding: 80px 0;
        font-size: 1.1rem;
        color: #ff4444;
        display: none;
      }
    </style>
  </head>

  <body>
    <div id="loading">loADing...</div>
    <div id="error">DAtA not founD</div>

    <div class="info-section" id="infoSection" style="display: none">
      <canvas id="ballCanvas" width="200" height="200"></canvas>
      <div class="person-name" id="person-name"></div>
      <div class="person-title" id="person-title"></div>

      <div class="stats">
        <div class="stat-label">totAl</div>
        <div class="stat-bar-wrap">
          <div class="stat-bar total-bar" id="total-bar"></div>
        </div>

        <div class="stat-label" id="dd-label" style="display: none">
          suspicious . . .
        </div>
        <div class="stat-bar-wrap" id="dd-bar-wrap" style="display: none">
          <div class="stat-bar dd-bar" id="dd-bar"></div>
        </div>

        <div class="stat-label" id="comp-label" style="display: none">
          compulsion
        </div>
        <div class="stat-bar-wrap" id="comp-bar-wrap" style="display: none">
          <div class="stat-bar compulsion-bar" id="comp-bar"></div>
        </div>
      </div>

      <button class="backBtn" onclick="history.back()">go bAck</button>
    </div>

    <div class="others-section" id="othersSection" style="display: none">
      <div class="others-label">witH otHer cHArActers</div>
      <canvas id="othersCanvas"></canvas>
    </div>

    <script>
      const SHEET_CSV_URL =
        "https://docs.google.com/spreadsheets/d/e/2PACX-1vTBhXcN2APYQhEVXHw6ER56MC4i8mwqviKQH2F1W2G5FB3wR0Z84QHZ-ZFXokMklzmm7YOJNpdG3tws/pub?gid=666310940&single=true&output=csv";

      const TYPE_IMAGES = {
        A: ["images/a1.png", "images/a2.png", "images/a3.png"],
        H: ["images/h1.png", "images/h2.png", "images/h3.png"],
        D: ["images/d1.png", "images/d2.png", "images/d3.png"],
        DD: ["images/dd1.png", "images/dd2.png", "images/dd3.png"],
        NONE: ["images/none1.png", "images/none2.png", "images/none3.png"],
      };

      const LOADED_IMAGES = {};

      const LEVEL_COLORS = {
        1: ["#FF6600", "#FF0000", "#FF0066", "#CC00FF", "#0000FF"],
        2: ["#FF4400", "#FF0033", "#FF0088", "#8800FF", "#0044FF"],
        3: ["#FF3300", "#FF0055", "#DD00CC", "#6600FF", "#0022FF"],
        4: ["#FF9900", "#FFCC00", "#AAFF00", "#00FF88", "#00FFCC"],
        5: ["#FFAA00", "#FFE600", "#CCFF00", "#00FF44", "#00FFAA"],
      };

      function pickImage(type) {
        const list = TYPE_IMAGES[type] || TYPE_IMAGES["A"];
        return list[Math.floor(Math.random() * list.length)];
      }

      function pickColor(sev) {
        const p = LEVEL_COLORS[sev];
        return p[Math.floor(Math.random() * p.length)];
      }

      function loadImg(src) {
        return new Promise((resolve) => {
          if (LOADED_IMAGES[src]) {
            resolve(LOADED_IMAGES[src]);
            return;
          }
          const img = new Image();
          img.onload = () => {
            LOADED_IMAGES[src] = img;
            resolve(img);
          };
          img.onerror = () => resolve(null);
          img.src = src;
        });
      }

      // 모든 이미지 미리 로드
      function preloadAllImages() {
        const allSrcs = [
          ...TYPE_IMAGES.A,
          ...TYPE_IMAGES.H,
          ...TYPE_IMAGES.D,
          ...TYPE_IMAGES.DD,
          ...TYPE_IMAGES.NONE,
        ];
        return Promise.all(allSrcs.map((src) => loadImg(src)));
      }

      async function loadAllPeople() {
        const res = await fetch(SHEET_CSV_URL);
        const text = await res.text();
        const rows = text.trim().split("\n");
        const headers = rows[0]
          .split(",")
          .map((h) => h.trim().replace(/"/g, "").toLowerCase());
        const get = (cols, key) =>
          (cols[headers.indexOf(key)] || "").trim().replace(/"/g, "");

        return rows
          .slice(1)
          .map((row) => {
            const cols = row.split(",");
            return {
              name: get(cols, "name"),
              title: get(cols, "title"),
              type: get(cols, "type").toUpperCase(),
              total: parseFloat(get(cols, "total")) || 0,
              relationship: get(cols, "relationship"),
              suspicious_group: parseFloat(get(cols, "suspicious_group")) || 0,
              compulsion: parseFloat(get(cols, "compulsion")) || 0,
            };
          })
          .filter((p) => p.name.length > 0);
      }

      const params = new URLSearchParams(window.location.search);
      const targetName = params.get("name");

      // ── 상단 공 그래픽 (정적) ──
      async function drawMainBall(person) {
        const canvas = document.getElementById("ballCanvas");
        const ctx = canvas.getContext("2d");
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const r = 80;

        const imgSrc = pickImage(person.type);
        const img = await loadImg(imgSrc);
        const color = pickColor(person.sev);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.2)";
        ctx.shadowBlur = 20;
        ctx.shadowOffsetY = 8;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.restore();

        if (img) {
          ctx.save();
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.clip();
          ctx.drawImage(img, cx - r, cy - r, r * 2, r * 2);
          ctx.restore();
        }
      }

      // ── 하단 캔버스 물리 ──
      let othBalls = [];
      let othW, othH, othRaf;
      let othCanvas, othCtx;

      function computeOthSpeed(y) {
        const frac = Math.max(0, Math.min(1, (y - 100) / (othH - 200)));
        return 1 + frac * frac * 9.5;
      }

      function makeMiniBall(person) {
        const sev = Math.min(5, Math.max(1, Math.ceil(person.total / 20)));
        const color = pickColor(sev);
        const r = 44 + Math.random() * 18;
        const padding = r + 60;
        const targetY = padding + (person.total / 100) * (othH - padding * 2);
        const waves = Array.from({ length: 3 }, () => ({
          amp: 25 + Math.random() * 15,
          freq: 0.003 + Math.random() * 0.012,
          phase: Math.random() * Math.PI * 2,
        }));

        return {
          name: person.name,
          total: person.total,
          type: person.type,
          imageSrc: pickImage(person.type),
          color,
          r,
          targetY,
          x: r + Math.random() * (othW - r * 2),
          y: targetY, // 처음부터 자기 자리
          vx: (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 3),
          vy: 0,
          tick: Math.random() * 1000,
          waves,
        };
      }

      function drawMiniBall(b) {
        othCtx.save();
        othCtx.translate(b.x, b.y);
        othCtx.shadowColor = "rgba(0,0,0,0.15)";
        othCtx.shadowBlur = 12;
        othCtx.shadowOffsetY = 5;

        const img = LOADED_IMAGES[b.imageSrc];
        if (img) {
          othCtx.beginPath();
          othCtx.arc(0, 0, b.r, 0, Math.PI * 2);
          othCtx.clip();
          othCtx.drawImage(img, -b.r, -b.r, b.r * 2, b.r * 2);
        } else {
          othCtx.beginPath();
          othCtx.arc(0, 0, b.r, 0, Math.PI * 2);
          othCtx.fillStyle = b.color;
          othCtx.fill();
        }
        othCtx.restore();
      }

      function updateMiniBall(b) {
        b.tick += 1;
        b.x += b.vx;

        if (b.x - b.r < 0) {
          b.x = b.r;
          b.vx = Math.abs(b.vx) * 0.92;
        }
        if (b.x + b.r > othW) {
          b.x = othW - b.r;
          b.vx = -Math.abs(b.vx) * 0.92;
        }

        const liveSpd = 0.8 + (b.total / 100) * 2.5;
        const curSpd = Math.abs(b.vx);
        b.vx += (b.vx > 0 ? 1 : -1) * (liveSpd - curSpd) * 0.04;

        let yOff = 0;
        for (const w of b.waves)
          yOff += Math.sin(b.tick * w.freq + w.phase) * w.amp;
        b.y += (b.targetY + yOff - b.y) * 0.08;

        if (b.y - b.r < 0) b.y = b.r;
      }

      function othLoop() {
        othCtx.clearRect(0, 0, othW, othH);
        for (const b of othBalls) drawMiniBall(b);
        for (const b of othBalls) updateMiniBall(b);
        othRaf = requestAnimationFrame(othLoop);
      }

      function startOthers(people) {
        othCanvas = document.getElementById("othersCanvas");
        othCtx = othCanvas.getContext("2d");

        othW = window.innerWidth;
        othH = Math.max(300, Math.ceil(people.length / 3) * 220);

        othCanvas.width = othW;
        othCanvas.height = othH;
        othCanvas.style.height = othH + "px";

        // 이미지 이미 로드됐으니 바로 공 생성
        othBalls = people.map((p) => makeMiniBall(p));
        othLoop();

        window.addEventListener("resize", () => {
          othW = window.innerWidth;
          othCanvas.width = othW;
          othBalls.forEach((b) => {
            if (b.x > othW - b.r) b.x = othW - b.r;
          });
        });
      }

      // ── 메인 init ──
      async function init() {
        try {
          const allPeople = await loadAllPeople();
          document.getElementById("loading").style.display = "none";

          const person = allPeople.find(
            (p) => p.name === targetName && p.type !== "NONE",
          );

          if (!person) {
            document.getElementById("error").style.display = "block";
            return;
          }

          person.sev = Math.min(5, Math.max(1, Math.ceil(person.total / 20)));

          // 정보 채우기
          document.getElementById("person-name").textContent = person.name;
          document.getElementById("person-title").textContent =
            person.title || "";

          document.getElementById("infoSection").style.display = "flex";

          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              document.getElementById("total-bar").style.transition =
                "width 0.9s cubic-bezier(0.22,1,0.36,1)";
              document.getElementById("total-bar").style.width =
                `${person.total}%`;

              if (person.suspicious_group > 0) {
                document.getElementById("dd-label").style.display = "block";
                document.getElementById("dd-bar-wrap").style.display = "block";
                setTimeout(() => {
                  document.getElementById("dd-bar").style.transition =
                    "width 0.9s cubic-bezier(0.22,1,0.36,1)";
                  document.getElementById("dd-bar").style.width =
                    `${person.suspicious_group}%`;
                }, 150);
              }

              if (person.compulsion > 0) {
                document.getElementById("comp-label").style.display = "block";
                document.getElementById("comp-bar-wrap").style.display =
                  "block";
                setTimeout(() => {
                  document.getElementById("comp-bar").style.transition =
                    "width 0.9s cubic-bezier(0.22,1,0.36,1)";
                  document.getElementById("comp-bar").style.width =
                    `${(person.compulsion / 5) * 100}%`;
                }, 300);
              }
            });
          });

          // 이미지 모두 로드
          await preloadAllImages();

          // 상단 공 그래픽
          await drawMainBall(person);

          // 하단 캔버스 — 메인 공 + NONE 공
          const noneMatches = allPeople.filter(
            (p) => p.type === "NONE" && p.title === person.title,
          );
          const otherPeople = [person, ...noneMatches];

          document.getElementById("othersSection").style.display = "block";
          startOthers(otherPeople);
        } catch (err) {
          document.getElementById("loading").style.display = "none";
          document.getElementById("error").style.display = "block";
          console.error("데이터 로드 실패:", err);
        }
      }

      init();
    </script>
  </body>
</html>
