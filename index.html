      * {
        margin: 0;

      /* ── 로딩 오버레이 ── */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        overflow: hidden;
      }

      #waveCanvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .loading-text {
        position: relative;
        z-index: 10;
        font-family: "Cossette Texte", sans-serif;
        font-size: clamp(1.2rem, 3.5vw, 2rem);
        color: rgba(0, 0, 0, 0.7);
        letter-spacing: 2px;
        min-height: 2.5rem;
        text-align: center;
        min-width: 300px;
      }

      /* ── 기존 스타일 ── */
      body {
        overflow-x: hidden;
        overflow-y: scroll;
        min-height: 400vh;
        background: linear-gradient(
          180deg,
          #f05 0.01%,
          #d400ff 20.67%,
          #0015ff 52.88%,
          #00ffd0 76.44%,
          #ffa600 96.15%
        );
        font-family: "Cossette Texte", sans-serif;
      }

      #wrap {
        width: 100%;
        height: 400vh;
        position: relative;
        overflow: visible;
      }

      #canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 2;
        pointer-events: none;
      }

      .bigButton {
        position: absolute;
        top: -1rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1;
        display: flex;
        gap: 12px;
        align-items: flex-end;
        justify-content: center;
      }

      .worldButton:hover .title-text {
        fill: #00ff40;
      }

      .worldButton {
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 0;
      }

      .makeB {
        position: fixed;
        bottom: 3rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.5);
        border: none;
        font-family: "Cossette Texte", sans-serif;
        font-size: 1.3rem;
        cursor: pointer;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.1),
          inset 0 0.5px 0 rgba(255, 255, 255, 0.6);
        transition: 0.2s ease;
        padding: 7px 24px;
        border-radius: 16px;
        white-space: nowrap;
        width: auto;
        min-width: unset;
        max-width: unset;
        box-sizing: border-box;
      }

      .makeB:hover {
        background: rgba(255, 255, 255, 0.8);
        transform: translateX(-50%) scale(1.04);
      }
    </style>

    <!-- 1. 공통 함수 로드 -->

    <!-- 2. 이 페이지만의 코드 -->
    <script>
      // ══════════════════════════════════════
      // 로딩 화면
      // ══════════════════════════════════════
      (function () {
        const overlay = document.getElementById("loadingOverlay");
        // ← 추가: 이미 본 적 있으면 로딩 스킵
        // 뒤로가기로 온 경우에만 스킵 (새로고침은 항상 로딩 표시)
        const navEntry = performance.getEntriesByType("navigation")[0];
        const isBackForward = navEntry && navEntry.type === "back_forward";

        if (isBackForward) {
          overlay.style.display = "none";
          return;
        }
        const wCanvas = document.getElementById("waveCanvas");
        const wCtx = wCanvas.getContext("2d");
        const textEl = document.getElementById("loadingText");

        function resizeWave() {
          wCanvas.width = window.innerWidth;
          wCanvas.height = window.innerHeight;
        }
        resizeWave();
        window.addEventListener("resize", resizeWave);

        const COLORS = [
          [0, 255, 255],
          [0, 100, 255],
          [150, 0, 255],
          [255, 0, 200],
          [255, 100, 0],
          [255, 220, 0],
          [0, 255, 100],
        ];

        const waveStart = Date.now();

        function drawWaves() {
          const W = wCanvas.width;
          const H = wCanvas.height;
          const cx = W / 2;
          const cy = H / 2;
          const t = (Date.now() - waveStart) / 1000;
          const maxR = Math.sqrt(cx * cx + cy * cy) * 1.5;

          wCtx.clearRect(0, 0, W, H);

          const RINGS = 200;
          for (let i = RINGS; i >= 0; i--) {
            const frac = i / RINGS;
            const r = frac * maxR;

            // 색상만 시간에 따라 흘러감 — 무한 순환
            const ci = (frac * COLORS.length * 1 - t * 5) % COLORS.length;
            const ci0 =
              ((Math.floor(ci) % COLORS.length) + COLORS.length) %
              COLORS.length;
            const ci1 = (ci0 + 1) % COLORS.length;
            const bl = ci - Math.floor(ci);
            const rc = Math.round(
              COLORS[ci0][0] * (1 - bl) + COLORS[ci1][0] * bl,
            );
            const gc = Math.round(
              COLORS[ci0][1] * (1 - bl) + COLORS[ci1][1] * bl,
            );
            const bc = Math.round(
              COLORS[ci0][2] * (1 - bl) + COLORS[ci1][2] * bl,
            );

            wCtx.save();
            wCtx.translate(cx, cy);
            wCtx.scale(1, 0.58);
            wCtx.beginPath();
            wCtx.arc(0, 0, r, 0, Math.PI * 2);
            wCtx.fillStyle = `rgb(${rc},${gc},${bc})`;
            wCtx.fill();
            wCtx.restore();
          }
        }

        const MESSAGES = [
          "A is entering . . .",
          "D is entering . . .",
          "H is entering . . .",
          "d . . . may enter",
        ];

        let msgIdx = 0;
        let charIdx = 0;

        function typeNext() {
          if (msgIdx >= MESSAGES.length) {
            setTimeout(finishLoading, 1000);
            return;
          }
          const msg = MESSAGES[msgIdx];
          charIdx++;
          textEl.textContent = msg.slice(0, charIdx);

          if (charIdx >= msg.length) {
            setTimeout(() => {
              msgIdx++;
              charIdx = 0;
              typeNext();
            }, 800);
          } else {
            setTimeout(typeNext, 100);
          }
        }

        let waveRaf;
        function waveLoop() {
          drawWaves();
          waveRaf = requestAnimationFrame(waveLoop);
        }
        waveLoop();
        setTimeout(typeNext, 300);

        function finishLoading() {
          cancelAnimationFrame(waveRaf);
          overlay.style.display = "none";
        }
      })();

      // ══════════════════════════════════════
      // 기존 페이지 코드
      // ══════════════════════════════════════
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const wrap = document.getElementById("wrap");
      let W,
        H,
        balls = [],
        raf;

      async function init() {
        resize();
        let people = [];
        if (USE_GOOGLE_SHEETS) {
          try {
            people = await loadFromGoogleSheets();
            people = people.filter((p) => p.type !== "NONE");
          } catch (err) {
            console.warn("Sheet load failed:", err);
          }
        }

        preloadImages(() => {
          balls = people.map((p) =>
            makeBall(p, true, Math.floor(Math.random() * 90)),
          );
          if (raf) cancelAnimationFrame(raf);
          loop();
        });
      }

      window.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top + window.scrollY;

        for (const b of balls) {
          if (!b.active) continue;
          const dx = mx - b.x;
          const dy = my - b.y;
          if (Math.sqrt(dx * dx + dy * dy) <= b.r) {
            window.location.href = `detail.html?name=${encodeURIComponent(b.name)}`;
            break;
          }
        }
      });

      window.addEventListener("resize", resize);
      init();

      // 새로 생성된 공 빛 테두리 효과
      const urlParams = new URLSearchParams(window.location.search);
      const newBallName = urlParams.get("newball");

      if (newBallName) {
        let found = false;

        const glowInterval = setInterval(() => {
          const target = balls.find((b) => b.name === newBallName);
          if (target) {
            found = true;
            clearInterval(glowInterval);
            target.glowing = true;
            setTimeout(() => {
              target.glowing = false;
            }, 3000);
          }
        }, 300);

        setTimeout(() => {
          if (!found) {
            clearInterval(glowInterval);
            const newBallType = urlParams.get("type") || "A";
            const newBallTotal = parseInt(urlParams.get("total")) || 50;
            const tempPerson = {
              name: newBallName,
              total: newBallTotal,
              type: newBallType.toUpperCase(),
              sev: Math.min(5, Math.max(1, Math.ceil(newBallTotal / 20))),
            };
            const tempBall = makeBall(tempPerson, true, 0);
            tempBall.glowing = true;
            balls.push(tempBall);
            setTimeout(() => {
              tempBall.glowing = false;
            }, 3000);
          }
        }, 5000);
      }
    </script>
