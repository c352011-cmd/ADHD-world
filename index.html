    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow-x: hidden;
        overflow-y: scroll;
        min-height: 400vh;
        background: linear-gradient(
          180deg,
          #f05 0.01%,
          #d400ff 20.67%,
          #0015ff 52.88%,
          #00ffd0 76.44%,
          #ffa600 96.15%

        font-family: "Cossette Texte", sans-serif;

        /* background-attachment: fixed; ← 스크롤해도 배경 고정 */
        font-family: "Cossette Texte", sans-serif;
      }

      /* 전체 스크롤 영역 */
      #wrap {
        width: 100%;
        height: 400vh;
        position: relative;
        overflow: visible;
      }

      /* 캔버스 — 페이지 전체를 덮음 */
      #canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 2;
        pointer-events: none; /* 캔버스 아래 버튼 클릭 가능 */
      }

      /* 타이틀 버튼 영역 */
      .bigButton {
        position: absolute;
        top: -1rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1;
        display: flex;
        gap: 12px;
        align-items: flex-end;
        justify-content: center;
      }

      .worldButton:hover .title-text {
        fill: #00ff40;
      }

      /* .worldButton:hover .title-text-dd {
        fill: #ff0d00;
      } */

      /* .title-text-dd {
        display: inline-flex;
        padding-top: 90px;
        flex-direction: column;
        justify-content: flex-end;
        align-items: center;
      } */

      .worldButton {
        border: none;
        background: transparent;
        cursor: pointer;
        padding: 0;
      }

      /* tHrow your bAll 버튼 */
      .makeB {
        position: fixed;
        bottom: 3rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;

        justify-content: center;
        align-items: center;

        background: rgba(255, 255, 255, 0.5);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        border: none;
        font-family: "Cossette Texte", sans-serif;
        font-size: 1.3rem;
        cursor: pointer;

        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.4); /* 얇은 흰 테두리 */
        box-shadow:
          0 4px 24px rgba(0, 0, 0, 0.1),
          /* 아래 그림자 */ inset 0 0.5px 0 rgba(255, 255, 255, 0.6); /* 상단 하이라이트 */
        transition: 0.2s ease;

        padding: 7px 24px;
        border-radius: 16px;

        white-space: nowrap;
        width: auto; /* ← 자동 너비 */
        min-width: unset; /* ← 최소 너비 제거 */
        max-width: unset; /* ← 최대 너비 제거 */
        box-sizing: border-box;
      }

      .makeB:hover {
        background: rgba(255, 255, 255, 0.8);
        transform: translateX(-50%) scale(1.04);
      }
    </style>

      <!-- tHrow your bAll 버튼 -->

    <!-- 1. 공통 함수 로드 -->
    <script src="ball.js"></script>

    <!-- 2. 이 페이지만의 코드 -->
    <script>
      // 캔버스 & 컨텍스트 설정
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const wrap = document.getElementById("wrap");
      let W,
        H,
        balls = [],
        raf;

      // 초기화 & 시트 데이터 로드
      async function init() {
        resize();
        let people = [];
        if (USE_GOOGLE_SHEETS) {
          try {
            people = await loadFromGoogleSheets();
            people = people.filter((p) => p.type !== "NONE");
          } catch (err) {
            console.warn("Sheet load failed:", err);
          }
        }

        preloadImages(() => {
          balls = people.map((p) =>
            makeBall(p, true, Math.floor(Math.random() * 90)),
          );
          if (raf) cancelAnimationFrame(raf);
          loop();
        });
      }

      // 클릭 이벤트는 init() 완전히 밖에, window에 등록
      window.addEventListener("click", (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top + window.scrollY;

        for (const b of balls) {
          if (!b.active) continue;
          const dx = mx - b.x;
          const dy = my - b.y;
          if (Math.sqrt(dx * dx + dy * dy) <= b.r) {
            window.location.href = `detail.html?name=${encodeURIComponent(b.name)}`;
            break;
          }
        }
      });

      window.addEventListener("resize", resize);
      init();
      // 새로 생성된 공 빛 테두리 효과
      const urlParams = new URLSearchParams(window.location.search);
      const newBallName = urlParams.get("newball");

      if (newBallName) {
        let found = false;

        const glowInterval = setInterval(() => {
          const target = balls.find((b) => b.name === newBallName);
          if (target) {
            found = true;
            clearInterval(glowInterval);
            target.glowing = true;
            setTimeout(() => {
              target.glowing = false;
            }, 3000);
          }
        }, 300);

        // 5초 후에도 못 찾으면 — 임시 공을 직접 만들어서 glow 표시
        setTimeout(() => {
          if (!found) {
            clearInterval(glowInterval);

            // URL 파라미터에서 type도 받아오거나 기본값 사용
            const tempPerson = {
              name: newBallName,
              total: 50,
              type: "A",
              sev: 3,
            };

            const tempBall = makeBall(tempPerson, true, 0);
            tempBall.glowing = true;
            balls.push(tempBall);

            setTimeout(() => {
              tempBall.glowing = false;
            }, 3000);
          }
        }, 5000);
      }
    </script>
  </body>
